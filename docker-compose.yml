# Development compose — credentials and ports are intentionally open for local use.
# DO NOT expose this directly to the internet without:
#   - rotating POSTGRES_PASSWORD / DATABASE_URL via a secret manager
#   - setting API_AUTH_TOKEN and FRONTEND_ACCESS_KEY
#   - placing TLS termination in front of the api and web services
#   - configuring REDIS_URL for cross-replica event bus + rate limiting
#   - setting ENVIRONMENT=production (enables CORS guard, disables API docs)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-booking}
      POSTGRES_DB: booking
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://booking:${POSTGRES_PASSWORD:-booking}@db:5432/booking
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Set in production to enforce bearer auth on every /runs call.
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      # Set to enable shared event bus + rate limiter across replicas.
      REDIS_URL: ${REDIS_URL:-}
      # Optional integrations — set to go live (else dry-run):
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-}
      MAIL_FROM: ${MAIL_FROM:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-booking-agent}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    environment:
      # Set to gate the BFF proxy behind a shared access key (see route.ts).
      FRONTEND_ACCESS_KEY: ${FRONTEND_ACCESS_KEY:-}
      BOOKING_AGENT_API_URL: http://api:8000
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
    ports:
      - "3000:3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

volumes:
  db_data:
